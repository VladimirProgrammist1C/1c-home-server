# =============================================================================
# Алерты для мониторинга инфраструктуры 1С
# =============================================================================
# Этот файл подключается в prometheus.yml через rule_files
# =============================================================================

groups:
  # ---------------------------------------------------------------------------
  # Группа 1: Мониторинг самого Prometheus
  # ---------------------------------------------------------------------------
  - name: prometheus-self-monitoring
    interval: 30s
    rules:
      # 🔴 Критический: Prometheus не отвечает
      - alert: PrometheusDown
        expr: up{job="prometheus"} == 0
        for: 1m
        labels:
          severity: critical
          service: prometheus
        annotations:
          summary: "🔴 Prometheus is DOWN"
          description: "Prometheus server is not responding on localhost:9090"
          runbook_url: "https://github.com/VladimirProgrammist1C/1c-home-server/blob/master/Docs/infrastructure-guide.md#диагностика"

      # 🟡 Предупреждение: Высокое потребление памяти Prometheus
      - alert: PrometheusHighMemory
        expr: process_resident_memory_bytes{job="prometheus"} > 512000000  # 512MB
        for: 5m
        labels:
          severity: warning
          service: prometheus
        annotations:
          summary: "⚠️ Prometheus High Memory Usage"
          description: "Prometheus is using more than 512MB of memory (current: {{ $value | humanize }})"

  # ---------------------------------------------------------------------------
  # Группа 2: Доступность сервисов (через Blackbox Exporter)
  # ---------------------------------------------------------------------------
  - name: service-availability
    interval: 30s
    rules:
      # 🔴 pgAdmin недоступен
      - alert: PgAdminDown
        expr: probe_success{instance="http://pgadmin4:80", job="blackbox-http"} == 0
        for: 2m
        labels:
          severity: critical
          service: pgadmin
        annotations:
          summary: "🔴 pgAdmin is DOWN"
          description: "pgAdmin web interface is not responding"

      # 🔴 Portainer недоступен
      - alert: PortainerDown
        expr: probe_success{instance="http://portainer:9000", job="blackbox-http"} == 0
        for: 2m
        labels:
          severity: critical
          service: portainer
        annotations:
          summary: "🔴 Portainer is DOWN"
          description: "Portainer web interface is not responding"

      # 🔴 Grafana недоступна
      - alert: GrafanaDown
        expr: probe_success{instance="http://grafana:3000/api/health", job="blackbox-http"} == 0
        for: 2m
        labels:
          severity: critical
          service: grafana
        annotations:
          summary: "🔴 Grafana is DOWN"
          description: "Grafana health endpoint is not responding"

      # 🔴 VoceChat недоступен
      - alert: VoceChatDown
        expr: probe_success{instance="http://vocechat-notifications:3000", job="blackbox-http"} == 0
        for: 2m
        labels:
          severity: critical
          service: vocechat
        annotations:
          summary: "🔴 VoceChat is DOWN"
          description: "VoceChat notifications service is not responding"

  # ---------------------------------------------------------------------------
  # Группа 3: PostgreSQL метрики
  # ---------------------------------------------------------------------------
  - name: postgresql-monitoring
    interval: 30s
    rules:
      # 🔴 PostgreSQL не отвечает
      - alert: PostgreSQLDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
          service: postgresql
        annotations:
          summary: "🔴 PostgreSQL is DOWN"
          description: "PostgreSQL exporter cannot connect to database"

      # 🟡 Много активных подключений
      - alert: PostgreSQLHighConnections
        expr: pg_stat_activity_count > 50
        for: 5m
        labels:
          severity: warning
          service: postgresql
        annotations:
          summary: "⚠️ PostgreSQL High Connections"
          description: "More than 50 active connections (current: {{ $value }})"

  # ---------------------------------------------------------------------------
  # Группа 4: Ресурсы контейнеров (через cAdvisor)
  # ---------------------------------------------------------------------------
  - name: container-resources
    interval: 30s
    rules:
      # 🟡 Высокое потребление CPU контейнером
      - alert: ContainerHighCPU
        expr: rate(container_cpu_usage_seconds_total{name!=""}[5m]) * 100 > 80
        for: 5m
        labels:
          severity: warning
          service: container
        annotations:
          summary: "⚠️ High CPU Usage: {{ $labels.name }}"
          description: "Container {{ $labels.name }} is using more than 80% CPU (current: {{ $value | printf \"%.2f\" }}%)"

      # 🟡 Высокое потребление памяти контейнером
      - alert: ContainerHighMemory
        expr: container_memory_usage_bytes{name!=""} > 1000000000  # 1GB
        for: 5m
        labels:
          severity: warning
          service: container
        annotations:
          summary: "⚠️ High Memory Usage: {{ $labels.name }}"
          description: "Container {{ $labels.name }} is using more than 1GB RAM (current: {{ $value | humanize }})"

