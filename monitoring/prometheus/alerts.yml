# =============================================================================
# Алерты для мониторинга инфраструктуры 1С
# Версия: 3.1 (Русский язык + Labels для всех алертов)
# =============================================================================

groups:
  # ---------------------------------------------------------------------------
  # Группа 1: Критические сервисы (Prometheus self-monitoring)
  # ---------------------------------------------------------------------------
  - name: infrastructure-critical
    rules:
      - alert: PostgreSQLDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
          threshold: "1"
          unit: "(должен быть 1)"
        annotations:
          summary: "🔴 PostgreSQL недоступен"
          description: "PostgreSQL exporter не может подключиться к базе данных"

      - alert: PrometheusDown
        expr: up{job="prometheus"} == 0
        for: 1m
        labels:
          severity: critical
          threshold: "1"
          unit: "(должен быть 1)"
        annotations:
          summary: "🔴 Prometheus недоступен"
          description: "Сервер Prometheus не отвечает"

      - alert: cAdvisorDown
        expr: up{job="cadvisor"} == 0
        for: 1m
        labels:
          severity: critical
          threshold: "1"
          unit: "(должен быть 1)"
        annotations:
          summary: "🔴 cAdvisor недоступен"
          description: "cAdvisor не отвечает"

  # ---------------------------------------------------------------------------
  # Группа 2: HTTP-проверки (Blackbox Exporter)
  # ---------------------------------------------------------------------------
  - name: blackbox-http
    rules:
      - alert: GrafanaDown
        expr: probe_success{instance="http://grafana:3000/api/health", job="blackbox-http"} == 0
        for: 2m
        labels:
          severity: critical
          threshold: "1"
          unit: "(должен быть 1)"
        annotations:
          summary: "🔴 Grafana недоступна"
          description: "Health endpoint Grafana не отвечает"

      - alert: PgAdminDown
        expr: probe_success{instance="http://pgadmin4:80", job="blackbox-http"} == 0
        for: 2m
        labels:
          severity: critical
          threshold: "1"
          unit: "(должен быть 1)"
        annotations:
          summary: "🔴 pgAdmin недоступен"
          description: "Веб-интерфейс pgAdmin не отвечает"

      - alert: PortainerDown
        expr: probe_success{instance="http://portainer:9000", job="blackbox-http"} == 0
        for: 2m
        labels:
          severity: critical
          threshold: "1"
          unit: "(должен быть 1)"
        annotations:
          summary: "🔴 Portainer недоступен"
          description: "Веб-интерфейс Portainer не отвечает"

      - alert: VoceChatDown
        expr: probe_success{instance="http://vocechat-notifications:3000", job="blackbox-http"} == 0
        for: 2m
        labels:
          severity: critical
          threshold: "1"
          unit: "(должен быть 1)"
        annotations:
          summary: "🔴 VoceChat недоступен"
          description: "Сервис уведомлений VoceChat не отвечает"

  # ---------------------------------------------------------------------------
  # Группа 3: Ресурсы контейнеров (cAdvisor)
  # ---------------------------------------------------------------------------
  - name: containers-resources
    rules:
      - alert: ContainerHighCPU
        expr: rate(container_cpu_usage_seconds_total{name!=""}[5m]) * 100 > 80
        for: 5m
        labels:
          severity: warning
          threshold: "80"
          unit: "%"
        annotations:
          summary: "⚠️ Высокая загрузка CPU"
          description: "Контейнер {{ $labels.name }} использует более 80% CPU (текущее: {{ $value | printf \"%.2f\" }}%)"

      - alert: ContainerHighMemory
        expr: container_memory_usage_bytes{name!=""} > 1073741824
        for: 5m
        labels:
          severity: warning
          threshold: "1073741824"
          unit: "байт (>1 ГБ)"
        annotations:
          summary: "⚠️ Высокое потребление памяти"
          description: "Контейнер {{ $labels.name }} использует более 1 ГБ ОЗУ (текущее: {{ $value | humanize }})"

  # ---------------------------------------------------------------------------
  # Группа 4: Метрики 1С (РАБОЧИЕ)
  # ---------------------------------------------------------------------------
  - name: 1c-metrics-working
    rules:
      # ✅ Большой размер базы данных
      - alert: HighDatabaseSize
        expr: onec_database_size_gb_gigabytes{database="DemoHRMCorpDemo_bot"} > 3
        for: 1m
        labels:
          severity: warning
          threshold: "3"
          unit: "ГБ"
        annotations:
          summary: "📊 Большой размер базы данных"
          description: |
            Размер базы данных превысил допустимый лимит.
            🔍 Проверить дашборд: http://localhost:3002/d/1c-infrastructure-overview-1?viewPanel=4

      # ✅ Много подключений 1С (общий счётчик)
      - alert: High1CConnections
        expr: sum(onec_total_connections_count{database="DemoHRMCorpDemo_bot"}) > 4
        for: 1m
        labels:
          severity: warning
          threshold: "4"
          unit: "подключений"
        annotations:
          summary: "🔌 Много подключений к 1С"
          description: "Количество подключений к 1С превышает порог (текущее: {{ $value }})\n🔍 Кто подключен: http://localhost:3002/d/1c-infrastructure-overview-1?viewPanel=3"

      # ✅ Подозрительная активность пользователя (опционально)
      - alert: HighUserConnections
        expr: onec_connections_detail_count{database="DemoHRMCorpDemo_bot"} > 2
        for: 1m
        labels:
          severity: warning
          threshold: "2"
          unit: "подключений на пользователя"
        annotations:
          summary: "⚠️ Подозрительная активность пользователя"
          description: "Пользователь {{ $labels.username }} ({{ $labels.app_name }}) с IP {{ $labels.client_ip }} имеет {{ $value }} подключений!\n🔍 Проверить панель: http://localhost:3002/d/1c-infrastructure-overview-1?viewPanel=5"

